name: Check common.sh versions

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: framework-common-version-maintenance-${{ github.repository }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  check-common-versions:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout trusted default revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          persist-credentials: false
          submodules: false

      - name: Set up reviewed Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version-file: ".python-version"
          check-latest: false

      - name: Install hash-locked CI dependency
        run: |
          set -euo pipefail
          python3 -m pip install --disable-pip-version-check --no-input --only-binary=:all: \
            --require-hashes -r requirements-ci.lock
          python3 -m pip check

      - name: Fetch checksum-verified ShellCheck
        env:
          TOOLS_DIR: ${{ runner.temp }}/framework-ci-security-tools
        run: |
          set -euo pipefail
          python3 ci/tools/fetch-security-tool.py --lock ci/tooling/security-tools.lock.yml \
            --tool shellcheck --output-dir "$TOOLS_DIR"

      - name: Validate an ephemeral common.sh candidate
        run: |
          set -euo pipefail
          export VERIFIED_RUN_ROOT="${RUNNER_TEMP}/ModSecurity-conector-verified"
          export XDG_STATE_HOME="${RUNNER_TEMP}/state"
          export BUILD_ROOT="${VERIFIED_RUN_ROOT}/build"
          mkdir -p "$BUILD_ROOT"
          cp ci/lib/common.sh "$BUILD_ROOT/common.sh"
          python3 ci/tools/check-common-versions.py --common-sh "$BUILD_ROOT/common.sh" \
            --update --markdown --write-files --timeout 20 | tee "$RUNNER_TEMP/common-version-check.md"
          cat "$RUNNER_TEMP/common-version-check.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Syntax and ShellCheck
        env:
          TOOLS_DIR: ${{ runner.temp }}/framework-ci-security-tools
        run: |
          set -euo pipefail
          export BUILD_ROOT="${RUNNER_TEMP}/ModSecurity-conector-verified/build"
          bash -n "$BUILD_ROOT/common.sh"
          bash -n ci/checks/catalog/check-common-helpers.sh
          "$TOOLS_DIR/shellcheck" -x "$BUILD_ROOT/common.sh" ci/checks/catalog/check-common-helpers.sh
          python3 -m py_compile ci/tools/check-common-versions.py

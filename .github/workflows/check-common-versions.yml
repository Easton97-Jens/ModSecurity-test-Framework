name: Check common.sh versions

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: framework-common-version-maintenance-${{ github.repository }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  check-common-versions:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
          submodules: false

      - name: Set up reviewed Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12.13"
          check-latest: false

      - name: Install hash-locked CI dependency
        run: |
          set -euo pipefail
          python3 -m pip install --disable-pip-version-check --no-input --only-binary=:all: \
            --require-hashes -r requirements-ci.lock
          python3 -m pip check

      - name: Fetch checksum-verified ShellCheck
        env:
          TOOLS_DIR: ${{ runner.temp }}/framework-ci-security-tools
        run: |
          set -euo pipefail
          python3 ci/tools/fetch-security-tool.py --lock ci/tooling/security-tools.lock.yml \
            --tool shellcheck --output-dir "$TOOLS_DIR"

      - name: Validate and update common.sh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          export VERIFIED_RUN_ROOT="${RUNNER_TEMP}/ModSecurity-conector-verified"
          export XDG_STATE_HOME="${RUNNER_TEMP}/state"
          export BUILD_ROOT="${VERIFIED_RUN_ROOT}/build"
          mkdir -p "$BUILD_ROOT"
          python3 ci/tools/check-common-versions.py --update --markdown --write-files --timeout 20 | tee common-version-check.md
          cp "$BUILD_ROOT/results/common-version-check/summary.json" common-version-summary.json
          cat common-version-check.md >> "$GITHUB_STEP_SUMMARY"

      - name: Format generated files
        run: |
          set -euo pipefail
          python3 -m json.tool common-version-summary.json > common-version-summary.pretty.json
          mv common-version-summary.pretty.json common-version-summary.json

      - name: Syntax and ShellCheck
        env:
          TOOLS_DIR: ${{ runner.temp }}/framework-ci-security-tools
        run: |
          set -euo pipefail
          bash -n ci/lib/common.sh
          bash -n ci/checks/catalog/check-common-helpers.sh
          "$TOOLS_DIR/shellcheck" -x ci/lib/common.sh ci/checks/catalog/check-common-helpers.sh
          python3 -m py_compile ci/tools/check-common-versions.py

      - name: Build pull request body
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path('common-version-summary.json').read_text())
          updates = data.get('updates_applied', [])
          english_lines = [
              '## English',
              '',
              'This pull request was created automatically by the `check-common-versions` workflow.',
              '',
              '### Updated components / variables',
              '',
          ]
          german_lines = [
              '## Deutsch',
              '',
              'Dieser Pull Request wurde automatisch vom Workflow `check-common-versions` erstellt.',
              '',
              '### Aktualisierte Komponenten / Variablen',
              '',
          ]
          if updates:
              english_lines.extend(['| Variable | Previous | New |', '| --- | --- | --- |'])
              german_lines.extend(['| Variable | Vorheriger Wert | Neuer Wert |', '| --- | --- | --- |'])
              for update in updates:
                  row = f"| `{update['variable']}` | `{update['old']}` | `{update['new']}` |"
                  english_lines.append(row)
                  german_lines.append(row)
          else:
              english_lines.append('No common.sh dependency version changes were generated.')
              german_lines.append('Es wurden keine Änderungen an common.sh-Abhängigkeitsversionen erzeugt.')
          validation = [
              '- `ci/tools/check-common-versions.py --update --markdown --write-files`',
              '- `bash -n ci/lib/common.sh ci/checks/catalog/check-common-helpers.sh`',
              '- `shellcheck -x ci/lib/common.sh ci/checks/catalog/check-common-helpers.sh`',
              '- `python3 -m py_compile ci/tools/check-common-versions.py`',
          ]
          english_lines.extend(['', '### Validation', '', *validation])
          german_lines.extend(['', '### Validierung', '', *validation, ''])
          Path('common-version-pr-body.md').write_text(
              '\n'.join([*english_lines, '', *german_lines]), encoding='utf-8'
          )
          PY

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ github.token }}
          commit-message: "chore: update common.sh dependency versions"
          title: "chore: update common.sh dependency versions"
          body-path: common-version-pr-body.md
          branch: automation/update-common-sh
          delete-branch: true
          add-paths: |
            ci/lib/common.sh

name: Check common.sh versions

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  check-common-versions:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Validate and update common.sh
        run: |
          set -euo pipefail
          export VERIFIED_RUN_ROOT="${RUNNER_TEMP}/ModSecurity-conector-verified"
          export XDG_STATE_HOME="${RUNNER_TEMP}/state"
          export BUILD_ROOT="${VERIFIED_RUN_ROOT}/build"
          mkdir -p "$BUILD_ROOT"
          python3 ci/check-common-versions.py --update --markdown --write-files --timeout 20 | tee common-version-check.md
          cp "$BUILD_ROOT/results/common-version-check/summary.json" common-version-summary.json
          cat common-version-check.md >> "$GITHUB_STEP_SUMMARY"

      - name: Format generated files
        run: |
          set -euo pipefail
          python3 -m json.tool common-version-summary.json > common-version-summary.pretty.json
          mv common-version-summary.pretty.json common-version-summary.json

      - name: Syntax and ShellCheck
        run: |
          set -euo pipefail
          bash -n ci/common.sh
          bash -n ci/check-common-helpers.sh
          shellcheck -x ci/common.sh ci/check-common-helpers.sh
          python3 -m py_compile ci/check-common-versions.py

      - name: Build pull request body
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('common-version-summary.json').read_text())
          updates = data.get('updates_applied', [])
          lines = [
              'This pull request was created automatically by the `check-common-versions` workflow.',
              '',
              '## Updated components / variables',
              '',
          ]
          if updates:
              lines.extend(['| Variable | Previous | New |', '| --- | --- | --- |'])
              for update in updates:
                  lines.append(f"| `{update['variable']}` | `{update['old']}` | `{update['new']}` |")
          else:
              lines.append('No common.sh dependency version changes were generated.')
          lines.extend(['', '## Validation', '', '- `ci/check-common-versions.py --update --markdown --write-files`', '- `bash -n ci/common.sh ci/check-common-helpers.sh`', '- `shellcheck -x ci/common.sh ci/check-common-helpers.sh`', '- `python3 -m py_compile ci/check-common-versions.py`', ''])
          Path('common-version-pr-body.md').write_text('\n'.join(lines), encoding='utf-8')
          PY

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ github.token }}
          commit-message: "chore: update common.sh dependency versions"
          title: "chore: update common.sh dependency versions"
          body-path: common-version-pr-body.md
          branch: automation/update-common-sh
          delete-branch: true
          add-paths: |
            ci/common.sh

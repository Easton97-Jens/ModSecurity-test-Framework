name: test-common

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: framework-test-common-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  common-structure:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false
          submodules: false

      - name: Set up reviewed Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: ".python-version"
          check-latest: false

      - name: Initialize runner temp paths
        run: |
          set -euo pipefail
          {
            echo "VERIFIED_RUN_ROOT=$RUNNER_TEMP/ModSecurity-conector-verified"
            echo "XDG_STATE_HOME=$RUNNER_TEMP/state"
            echo "PYTHONPYCACHEPREFIX=$RUNNER_TEMP/python-pycache"
          } >> "$GITHUB_ENV"

      - name: Compile framework Python
        run: |
          set -euo pipefail
          mapfile -t ci_python_files < <(find ci -type f -name '*.py' -print | sort)
          python3 -m py_compile tests/normalizers/*.py tests/runners/*.py "${ci_python_files[@]}"

      - name: Check shared YAML materialization
        run: |
          set -euo pipefail
          out="$VERIFIED_RUN_ROOT/case-runner"
          mkdir -p "$out"
          yaml_count=$(find tests/cases -type f -name "*.yaml" | wc -l)
          if [ "$yaml_count" -eq 0 ]; then
            echo "expected at least one YAML case, found none" >&2
            exit 1
          fi
          python3 tests/runners/case_cli.py list-cases \
            --repo-root "$GITHUB_WORKSPACE" \
            --framework-root "$GITHUB_WORKSPACE" \
            --connector-root "$GITHUB_WORKSPACE" \
            --connector apache \
            --scope common > "$out/apache-common-cases.txt"
          if [ ! -s "$out/apache-common-cases.txt" ]; then
            echo "expected at least one applicable Apache common case, found none" >&2
            exit 1
          fi
          while IFS= read -r case_file; do
            [ -n "$case_file" ] || continue
            name=$(basename "$case_file" .yaml)
            case_out="$out/$name"
            mkdir -p "$case_out"
            python3 tests/runners/case_cli.py materialize \
              --case "$case_file" \
              --rules-file "$case_out/rules.conf" \
              --env-file "$case_out/case.env" \
              --headers-file "$case_out/request-headers.txt" \
              --body-file "$case_out/request-body.bin" \
              --docroot "$case_out/htdocs" \
              --audit-log-file "$case_out/audit.log" \
              --audit-log-dir "$case_out/audit"
            . "$case_out/case.env"
            if [ -n "${EXPECT_RESPONSE_CONTAINS:-}" ]; then
              printf '%s\n' "$EXPECT_RESPONSE_CONTAINS" > "$case_out/response-body.txt"
            else
              : > "$case_out/response-body.txt"
            fi
            python3 tests/runners/case_cli.py write-audit-log-fixture \
              --case "$case_file" \
              --audit-log-file "$case_out/audit.log"
            python3 tests/runners/case_cli.py assert-status \
              --case "$case_file" \
              --actual-status "$EXPECT_STATUS" \
              --response-body-file "$case_out/response-body.txt" \
              --audit-log-file "$case_out/audit.log" \
              --status-file "$case_out/status.txt"
          done < "$out/apache-common-cases.txt"

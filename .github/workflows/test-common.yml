name: test-common

on:
  push:
  pull_request:

jobs:
  common-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile framework Python
        run: |
          python3 -m py_compile tests/normalizers/*.py tests/runners/*.py ci/*.py
      - name: Check shared YAML materialization
        run: |
          set -eu
          out="$RUNNER_TEMP/case-runner"
          mkdir -p "$out"
          for case_file in \
            tests/cases/*.yaml \
            tests/cases/*.yaml \
            tests/cases/*.yaml \
            tests/cases/*.yaml; do
            name=$(basename "$case_file" .yaml)
            case_out="$out/$name"
            mkdir -p "$case_out"
            python3 tests/runners/case_cli.py materialize \
              --case "$case_file" \
              --rules-file "$case_out/rules.conf" \
              --env-file "$case_out/case.env" \
              --headers-file "$case_out/request-headers.txt" \
              --body-file "$case_out/request-body.bin" \
              --docroot "$case_out/htdocs" \
              --audit-log-file "$case_out/audit.log" \
              --audit-log-dir "$case_out/audit"
            . "$case_out/case.env"
            if [ -n "${EXPECT_RESPONSE_CONTAINS:-}" ]; then
              printf '%s\n' "$EXPECT_RESPONSE_CONTAINS" > "$case_out/response-body.txt"
            else
              : > "$case_out/response-body.txt"
            fi
            python3 tests/runners/case_cli.py write-audit-log-fixture \
              --case "$case_file" \
              --audit-log-file "$case_out/audit.log"
            python3 tests/runners/case_cli.py assert-status \
              --case "$case_file" \
              --actual-status "$EXPECT_STATUS" \
              --response-body-file "$case_out/response-body.txt" \
              --audit-log-file "$case_out/audit.log" \
              --status-file "$case_out/status.txt"
          done
          python3 tests/runners/case_cli.py list-cases \
            --repo-root "$GITHUB_WORKSPACE" \
            --framework-root "$GITHUB_WORKSPACE" \
            --connector-root "$GITHUB_WORKSPACE" \
            --connector apache \
            --scope common > "$out/apache-common-cases.txt"

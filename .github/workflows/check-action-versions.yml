name: Check GitHub Action versions

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/dependabot.yml"

permissions:
  contents: read

jobs:
  check-action-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Validate workflow action pins
        run: |
          set -euo pipefail
          python3 ci/checks/security/check-workflow-action-pins.py

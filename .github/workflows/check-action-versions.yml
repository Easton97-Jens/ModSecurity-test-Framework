name: Check GitHub Action versions

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/dependabot.yml"
      - ".python-version"
      - "ci/checks/security/**"
      - "ci/tools/update-python-version.py"
      - "ci/tools/update-workflow-tools.py"
      - "ci/tooling/security-tools.lock.yml"
      - "requirements-ci.lock"
      - "tests/security_regression/test_workflow_action_pins.py"
      - "tests/security_regression/test_workflow_security_contract.py"
      - "tests/ci_security/test_python_version_contract.py"
      - "tests/ci_security/test_update_python_version.py"
      - "tests/ci_security/test_update_workflow_tools.py"
      - "tests/fixtures/workflow_security_contract/**"
      - "Makefile"

permissions:
  contents: read

concurrency:
  group: check-action-versions-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  check-action-versions:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false
          submodules: false

      - name: Set up reviewed Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version-file: ".python-version"
          check-latest: false

      - name: Install hash-locked CI dependency
        run: |
          set -euo pipefail
          python3 -m pip install --disable-pip-version-check --no-input --only-binary=:all: \
            --require-hashes -r requirements-ci.lock
          python3 -m pip check

      - name: Validate immutable Action pins and CI security contracts
        run: |
          set -euo pipefail
          python3 ci/checks/security/check-github-actions-workflows.py --check pins
          python3 ci/checks/security/check-workflow-action-pins.py
          python3 ci/checks/security/check-ci-security-contract.py
          python3 ci/checks/security/check-python-version.py
          python3 ci/checks/security/check-ci-security-evidence-contract.py

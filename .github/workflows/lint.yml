name: lint

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  scaffold-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Initialize runner temp paths
        run: |
          set -eu
          verified_root="$RUNNER_TEMP/ModSecurity-conector-verified"
          {
            echo "VERIFIED_RUN_ROOT=$verified_root"
            echo "XDG_STATE_HOME=$RUNNER_TEMP/state"
            echo "BUILD_ROOT=$verified_root/build"
            echo "PYTHONPYCACHEPREFIX=$RUNNER_TEMP/python-pycache"
          } >> "$GITHUB_ENV"
      - name: Install Python dev dependencies
        run: |
          set -eu
          python3 -m pip install -r requirements-dev.txt
      - name: Run framework lint
        run: |
          set -eu
          make lint

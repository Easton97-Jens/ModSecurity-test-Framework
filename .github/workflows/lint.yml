name: lint

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: framework-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  scaffold-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
          submodules: false

      - name: Set up reviewed Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12.13"
          check-latest: false

      - name: Initialize runner temp paths
        run: |
          set -euo pipefail
          verified_root="$RUNNER_TEMP/ModSecurity-conector-verified"
          {
            echo "VERIFIED_RUN_ROOT=$verified_root"
            echo "XDG_STATE_HOME=$RUNNER_TEMP/state"
            echo "BUILD_ROOT=$verified_root/build"
            echo "PYTHONPYCACHEPREFIX=$RUNNER_TEMP/python-pycache"
          } >> "$GITHUB_ENV"

      - name: Install hash-locked CI dependency
        run: |
          set -euo pipefail
          python3 -m pip install --disable-pip-version-check --no-input --only-binary=:all: \
            --require-hashes -r requirements-ci.lock
          python3 -m pip check

      - name: Run framework lint
        run: |
          set -euo pipefail
          make lint

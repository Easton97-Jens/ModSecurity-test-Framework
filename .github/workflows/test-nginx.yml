name: test-nginx

on:
  push:
  pull_request:

jobs:
  nginx-poc:
    runs-on: ubuntu-latest
    env:
      MODSECURITY_V3_GIT_URL: https://github.com/owasp-modsecurity/ModSecurity.git
      MODSECURITY_V3_GIT_REF: v3/master
      MODSECURITY_NGINX_GIT_URL: https://github.com/owasp-modsecurity/ModSecurity-nginx.git
      MODSECURITY_NGINX_GIT_REF: master
      BUILD_NGINX_FROM_SOURCE: "1"
      NGINX_SOURCE_MODE: github-release
      NGINX_GITHUB_REPO: https://github.com/nginx/nginx
      NGINX_RELEASE_TAG: latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize runner temp paths
        id: paths
        run: |
          set -eu
          build_root="$RUNNER_TEMP/ModSecurity-test-Framework-build"
          {
            echo "SOURCE_ROOT=$RUNNER_TEMP/sources"
            echo "BUILD_ROOT=$build_root"
            echo "LOG_DIR=$build_root/logs/nginx"
            echo "MODSECURITY_V3_SOURCE_DIR=$RUNNER_TEMP/sources/ModSecurity_V3"
            echo "MODSECURITY_NGINX_SOURCE_DIR=$RUNNER_TEMP/sources/ModSecurity-nginx"
            echo "PYTHONPYCACHEPREFIX=$RUNNER_TEMP/python-pycache"
          } >> "$GITHUB_ENV"
          echo "build_root=$build_root" >> "$GITHUB_OUTPUT"
      - name: Check NGINX scaffold
        run: |
          set -eu
          test -f connectors/nginx/harness/nginx_smoke.conf
          test -x connectors/nginx/harness/run_nginx_smoke.sh
          test -f connectors/nginx/harness/README.md
          test -f ci/fetch-smoke-sources.sh
          test -f ci/run-nginx-smoke.sh
          test -f tests/nginx/nginx-regression-map.md
          test -f tests/nginx/cases/imported/nginx_tx_scoring_absolute_block.yaml
          test -f tests/common/cases/minimal/phase2_args_block.yaml
          test -f tests/common/cases/imported/request_body_raw_text_block.yaml
          test -f tests/common/cases/imported/response_body_pass.yaml
          test -f tests/import-status.json
          test -f docs/nginx-poc.md
          test -f docs/apache-vs-nginx-poc.md
          test -f docs/test-import-plan.md
          test -f docs/real-world-connector-validation.md
          test -f docs/pr-evidence-summary.md
      - name: Syntax checks
        run: |
          set -eu
          sh -n ci/prepare-nginx-build.sh
          sh -n ci/fetch-smoke-sources.sh
          sh -n ci/run-nginx-smoke.sh
          sh -n connectors/nginx/harness/run_nginx_smoke.sh
          python3 -m py_compile tests/normalizers/*.py tests/runners/*.py
      - name: Fetch NGINX real-world smoke sources
        run: |
          sh ci/fetch-smoke-sources.sh nginx
      - name: Run NGINX real-world connector smoke or mark blocked
        run: |
          set +e
          REFRESH=1 make smoke-nginx
          rc=$?
          set -e
          if [ "$rc" -eq 77 ]; then
            echo "::notice::NGINX real-world connector smoke blocked; see $BUILD_ROOT/logs when sources/dependencies are available."
            exit 0
          fi
          exit "$rc"
      - name: Upload NGINX smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nginx-smoke-artifacts
          if-no-files-found: ignore
          path: |
            ${{ steps.paths.outputs.build_root }}/logs
            ${{ steps.paths.outputs.build_root }}/results
            ${{ steps.paths.outputs.build_root }}/nginx-runtime/*/conf

name: Safe trusted writer workflow

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Update from the GitHub API
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 -c "print('safe')"

name: Renamed workflow-level token scope

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CI_TOKEN: ${{ github['token'] }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

name: Pull request secret

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: python3 -c "print('unsafe')"

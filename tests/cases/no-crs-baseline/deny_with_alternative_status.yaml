name: deny_with_alternative_status
title: Deny a phase-1 marker with an alternative status
category: no-crs-baseline
portable: true
status: pending
no_crs_baseline: true
phase: 1
required_capabilities:
  - request_headers
  - phase1
  - deny
capabilities:
  request_headers: true
  phase1: true
  intervention: true
rules: |
  SecRuleEngine On
  SecAuditEngine RelevantOnly
  SecAuditLogType Serial
  SecAuditLogParts ABHZ
  SecAuditLog "@@AUDIT_LOG@@"
  SecAuditLogStorageDir "@@AUDIT_LOG_DIR@@"
request:
  method: GET
  path: /no-crs/alternative-status
  headers:
    X-Modsec-Smoke: alternative-status
expect:
  status: 429
  intervention: deny
  rule_id: 1100002
  audit_log:
    required: true
    rule_id: 1100002
    message: no-crs phase-1 alternative status
expected_result: deny
expected_status: 429
expected_rule_id: 1100002
expected_event_fields:
  - rule_id
  - phase
  - status
forbidden_event_fields:
  - request_body
  - response_body
connector_applicability: capability_driven
unsupported_behavior: UNSUPPORTED

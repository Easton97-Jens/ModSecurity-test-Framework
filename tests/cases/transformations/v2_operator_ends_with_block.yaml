# Source-derived V2 operator semantics smoke.
origin:
  - repo: ModSecurity_V2
    path: tests/op/endsWith.t
    reason: Derives from the V2 @endsWith case with param `ghi`, input `abcdefghi`, ret 1.
category: operators
portable: true
status: imported
known_limitations:
  - Converted from the V2 operator harness to an HTTP phase:2 intervention check.
  - NUL-containing input branch remains mapped only.
name: v2_operator_ends_with_block

capabilities:
  operators: true
  query_args: true
  phase2: true
  intervention: true

rules: |
  SecRuleEngine On
  SecRule ARGS:probe "@endsWith ghi" \
    "id:3221,phase:2,deny,status:403,msg:'v2 imported endsWith operator block'"

request:
  method: GET
  path: "/?probe=abcdefghi"

expect:
  status: 403
  intervention: deny
  rule_id: 3221

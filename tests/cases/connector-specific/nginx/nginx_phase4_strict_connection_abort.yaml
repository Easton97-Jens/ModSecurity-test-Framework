name: nginx_phase4_strict_connection_abort
origin:
  - repo: ModSecurity-nginx
    path: tests/modsecurity-phase4-modes.t
    reason: Derived from the PR #377 strict-mode late-intervention expectation.
category: response-body
capabilities:
  - response_body
  - phase4
  - intervention
  - logging
portable: false
connector: nginx
status: imported
former_xfail: true
former_xfail_reason: "Strict mode may abort the connection after headers are sent; current smoke schema asserts stable HTTP status and keeps this as NGINX-only former expected-failure evidence."
promoted_from_xfail_date: "2026-06-07"
known_limitations:
  - The current smoke harness expects stable HTTP status codes; strict mode may abort after headers are sent.
  - Normal runtime evidence now decides PASS/FAIL/BLOCKED/NOT_EXECUTABLE; strict abort still needs a dedicated empty-reply assertion.

rules: |
  SecRuleEngine On
  SecResponseBodyAccess On
  SecResponseBodyMimeType text/html text/plain
  SecRule RESPONSE_BODY "@contains Hello" \
    "id:910003,phase:4,deny,log,status:403,msg:'phase4 strict probe'"

nginx:
  location_directives: |
    modsecurity_phase4_mode strict;
    modsecurity_phase4_log "@@NGINX_PHASE4_LOG@@";

request:
  method: GET
  path: /

response:
  body: |
    Hello strict

expect:
  status: 403
  transport: connection_aborted
  intervention: deny
  rule_id: 910003
  phase4_log:
    required: true
    contains:
      - '"event":"phase4_intervention"'
      - '"actual_action":"connection_abort"'

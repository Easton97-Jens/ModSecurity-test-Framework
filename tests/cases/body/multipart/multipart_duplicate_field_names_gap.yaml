origin:
  - repo: ModSecurity-apache
    path: tests/regression/misc/00-multipart-parser.t
    reason: duplicate multipart field names connector-gap probe.
category: multipart
portable: true
status: imported
former_xfail: true
former_xfail_reason: "multipart/files/unicode/json/xml/xss-like/sqli-like compatibility candidate; runtime_verified=false and not counted as verified PASS."
promoted_from_xfail_date: "2026-06-07"
known_limitations:
  - "Classification: connector-gap."
  - Duplicate file field-name parser probe.
name: multipart_duplicate_field_names_gap
capabilities:
  multipart: true
  files: true
  request_body: true
  transformations: false
rules: |
  SecRuleEngine On
  SecRequestBodyAccess On
  SecRule FILES_NAMES "@contains upload" "id:4703,phase:2,deny,status:403,msg:'duplicate multipart file field names gap'"
request:
  method: POST
  path: /
  multipart:
    boundary: modsec-smoke-duplicate-file-fields
    parts:
      - name: upload
        filename: a.txt
        content_type: text/plain
        body: a
      - name: upload
        filename: b.txt
        content_type: text/plain
        body: b
expect:
  status: 403
  intervention: deny

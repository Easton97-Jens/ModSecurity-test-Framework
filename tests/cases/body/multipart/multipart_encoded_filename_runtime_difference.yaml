origin:
  - repo: ModSecurity_V3
    path: test/test-cases/regression/variable-MULTIPART_FILENAME.json
    reason: encoded multipart filename runtime-difference probe.
category: multipart
portable: true
status: imported
former_xfail: true
former_xfail_reason: "multipart/files/unicode/json/xml/xss-like/sqli-like compatibility candidate; runtime_verified=false and not counted as verified PASS."
promoted_from_xfail_date: "2026-06-07"
known_limitations:
  - "Classification: runtime-difference."
  - Runtime verification pending; not counted as verified PASS.
name: multipart_encoded_filename_runtime_difference
capabilities:
  multipart: true
  files: true
  request_body: true
  transformations: false
rules: |
  SecRuleEngine On
  SecRule MULTIPART_FILENAME "@contains %22" "id:4702,phase:2,deny,status:403,msg:'encoded multipart filename runtime diff'"
request:
  method: POST
  path: "/"
  headers:
    Content-Type: multipart/form-data; boundary=----AaB03x
  body: |
    ------AaB03x
    Content-Disposition: form-data; name="upload"; filename="file%22.txt"
    Content-Type: text/plain

    content
    ------AaB03x--
expect:
  status: 403
  intervention: deny

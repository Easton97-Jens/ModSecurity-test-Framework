origin:
  - repo: ModSecurity-apache
    path: tests/regression/rule/15-json.t
    reason: duplicate JSON keys runtime-difference probe.
category: body-processors
portable: true
status: xfail
known_limitations:
  - "Classification: runtime-difference."
  - Runtime verification pending; not counted as verified PASS.
name: json_duplicate_keys_runtime_difference
capabilities:
  multipart: false
  files: false
  request_body: true
  transformations: false
rules: |
  SecRuleEngine On
  SecRule REQUEST_BODY "@contains dupkey" "id:4710,phase:2,deny,status:403,msg:'duplicate json keys runtime diff'"
request:
  method: POST
  path: "/"
  headers:
    Content-Type: application/json
  body: |-
    {"dupkey":1,"dupkey":2}
expect:
  status: 403
  intervention: deny

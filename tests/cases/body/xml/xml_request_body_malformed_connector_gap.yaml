origin:
  - repo: ModSecurity-apache
    path: tests/regression/rule/10-xml.t
    reason: Source-derived malformed XML branch prepared as connector-gap probe.
category: body-processors
portable: true
status: imported
former_xfail: true
former_xfail_reason: "connector-gap coverage candidate; pending runtime verification and not counted as verified PASS."
promoted_from_xfail_date: "2026-06-07"
known_limitations:
  - Malformed XML parser/error behavior is not yet normalized in shared connector smoke.
name: xml_request_body_malformed_connector_gap
capabilities:
  xml: true
  request_body: true
  phase2: true
  intervention: true
rules: |
  SecRuleEngine On
  SecRequestBodyAccess On
  SecRule REQUEST_HEADERS:Content-Type "@rx ^(?:application|text)/xml$" \
    "id:44080,phase:1,t:none,t:lowercase,nolog,pass,ctl:requestBodyProcessor=XML"
  SecRule XML "@contains broken" "id:4408,phase:2,deny,status:403,msg:'former XFAIL malformed XML connector gap'"
request:
  method: POST
  path: /
  headers:
    Content-Type: application/xml
  body: "<root><broken></root>"
expect:
  status: 403
  intervention: deny

origin:
  - repo: ModSecurity_V3
    path: test/test-cases/regression/variable-RESPONSE_BODY.json
    reason: phase4 empty response body future compatibility target.
category: response-body
portable: true
status: imported
former_xfail: true
former_xfail_reason: "outbound response/audit compatibility candidate; runtime_verified=false; RESPONSE_BODY remains non-verified."
promoted_from_xfail_date: "2026-06-07"
known_limitations:
  - "Classification: fixture-syntax-gap fixed; uses a valid empty-body regex instead of an empty @streq argument."
  - Phase-4/empty-response behavior remains a future target unless full-matrix evidence proves otherwise.
name: phase4_response_body_empty_future_target
capabilities:
  response_headers: false
  response_body: true
  audit_log: false
  phase3: false
  phase4: true
rules: |
  SecRuleEngine On
  SecAuditEngine RelevantOnly
  SecAuditLogType Serial
  SecAuditLogParts ABHZ
  SecAuditLog "@@AUDIT_LOG@@"
  SecAuditLogStorageDir "@@AUDIT_LOG_DIR@@"
  SecResponseBodyAccess On
  SecResponseBodyMimeType text/html text/plain application/json
  SecRule RESPONSE_BODY "@rx ^$" "id:4806,phase:4,deny,status:403,msg:'phase4 empty response body future target'"
request:
  method: GET
  path: "/"
response:
  body: ""
expect:
  status: 403
  intervention: deny

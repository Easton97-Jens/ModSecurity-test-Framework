origin:
  - repo: ModSecurity-nginx PR #377
    path: tests/modsecurity-phase4-regression.t
    reason: phase4 buffering/order future target probe.
category: response-body
portable: true
status: imported
former_xfail: true
former_xfail_reason: "phase3/phase4 response/audit compatibility candidate; runtime_verified=false; RESPONSE_BODY non-verified."
promoted_from_xfail_date: "2026-06-07"
known_limitations:
  - "Classification: future-compatibility."
  - RESPONSE_BODY remains non-verified and non-promoted.
name: phase4_response_body_buffering_order_future_target
capabilities:
  response_headers: false
  response_body: true
  audit_log: false
  phase3: false
  phase4: true
rules: |
  SecRuleEngine On
  SecAuditEngine RelevantOnly
  SecAuditLogType Serial
  SecAuditLogParts ABHZ
  SecAuditLog "@@AUDIT_LOG@@"
  SecAuditLogStorageDir "@@AUDIT_LOG_DIR@@"
  SecResponseBodyAccess On
  SecResponseBodyMimeType text/html text/plain application/json
  SecRule RESPONSE_BODY "@contains late-buffer-marker" "id:4906,phase:4,deny,status:403,msg:'phase4 buffering order future target'"
request:
  method: GET
  path: "/"
response:
  body: |
    late-buffer-marker
expect:
  status: 403
  intervention: deny

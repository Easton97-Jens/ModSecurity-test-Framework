# Source-derived response-body pass-through smoke.
origin:
  - repo: ModSecurity-apache
    path: tests/regression/config/10-response-directives.t
    reason: Derives from SecResponseBodyAccess response-body directive coverage, but uses a non-matching pattern.
  - repo: ModSecurity-nginx
    path: tests/modsecurity-response-body.t
    reason: Derives from response-body access configuration while avoiding the upstream TODO block outcome.
category: response-body
portable: true
status: imported
known_limitations:
  - Pass-through does not prove response-body blocking.
  - NGINX response-body blocking remains mapped as former expected-failure because the upstream test marks it TODO and local probing did not produce stable HTTP 403.
name: response_body_pass

capabilities:
  response_body: true
  phase4: true
  pass_through: true

rules: |
  SecRuleEngine On
  SecResponseBodyAccess On
  SecResponseBodyMimeType text/html text/plain
  SecResponseBodyLimit 1048576
  SecRule RESPONSE_BODY "@contains NOT-PRESENT-IN-SMOKE-BODY" \
    "id:2701,phase:4,deny,status:403,msg:'shared imported response body non-match'"

request:
  method: GET
  path: /

response:
  body: |
    TEST-OK-IF-YOU-SEE-THIS

expect:
  status: 200
  intervention: none
  rule_id: none
  response_contains: TEST-OK-IF-YOU-SEE-THIS

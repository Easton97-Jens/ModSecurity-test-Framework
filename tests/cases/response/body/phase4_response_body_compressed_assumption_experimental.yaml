origin:
  - repo: ModSecurity-nginx PR #377
    path: tests/modsecurity-response-body.t
    reason: phase4 compressed response assumption experimental probe.
category: response-body
portable: true
status: imported
former_xfail: true
former_xfail_reason: "outbound response/audit compatibility candidate; runtime_verified=false; RESPONSE_BODY remains non-verified."
promoted_from_xfail_date: "2026-06-07"
known_limitations:
  - "Classification: experimental."
  - Phase-4/response behavior remains non-verified; no verified PASS claim.
name: phase4_response_body_compressed_assumption_experimental
capabilities:
  response_headers: false
  response_body: true
  audit_log: false
  phase3: false
  phase4: true
rules: |
  SecRuleEngine On
  SecAuditEngine RelevantOnly
  SecAuditLogType Serial
  SecAuditLogParts ABHZ
  SecAuditLog "@@AUDIT_LOG@@"
  SecAuditLogStorageDir "@@AUDIT_LOG_DIR@@"
  SecResponseBodyAccess On
  SecResponseBodyMimeType text/html text/plain application/json
  SecRule RESPONSE_BODY "@contains compressed" "id:4809,phase:4,deny,status:403,msg:'phase4 compressed assumption experimental'"
request:
  method: GET
  path: "/"
response:
  body: |
    compressed body marker
expect:
  status: 403
  intervention: deny

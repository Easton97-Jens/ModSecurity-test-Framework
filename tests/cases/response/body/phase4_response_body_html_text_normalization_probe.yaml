origin:
  - repo: ModSecurity-apache
    path: tests/regression/config/10-response-directives.t
    reason: phase4 html/text response body normalization probe.
category: response-body
portable: true
status: imported
former_xfail: true
former_xfail_reason: "outbound response/audit compatibility candidate; runtime_verified=false; RESPONSE_BODY remains non-verified."
promoted_from_xfail_date: "2026-06-07"
known_limitations:
  - "Former XFAIL classification; now normal runtime evidence."
  - Phase-4/response behavior remains non-verified; no verified PASS claim.
name: phase4_response_body_html_text_normalization_probe
capabilities:
  response_headers: false
  response_body: true
  audit_log: false
  phase3: false
  phase4: true
rules: |
  SecRuleEngine On
  SecAuditEngine RelevantOnly
  SecAuditLogType Serial
  SecAuditLogParts ABHZ
  SecAuditLog "@@AUDIT_LOG@@"
  SecAuditLogStorageDir "@@AUDIT_LOG_DIR@@"
  SecResponseBodyAccess On
  SecResponseBodyMimeType text/html text/plain application/json
  SecRule RESPONSE_BODY "@contains <html" "id:4810,phase:4,deny,status:403,msg:'phase4 html text normalization probe'"
request:
  method: GET
  path: "/"
response:
  body: |
    <html>ok</html>
expect:
  status: 403
  intervention: deny

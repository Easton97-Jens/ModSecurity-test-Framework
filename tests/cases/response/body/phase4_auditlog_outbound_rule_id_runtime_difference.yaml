origin:
  - repo: ModSecurity_V3
    path: test/test-cases/regression/auditlog.json
    reason: phase4 outbound audit rule-id runtime-difference probe.
category: audit-log
portable: true
status: imported
former_xfail: true
former_xfail_reason: "outbound response/audit compatibility candidate; runtime_verified=false; RESPONSE_BODY remains non-verified."
promoted_from_xfail_date: "2026-06-07"
known_limitations:
  - "Classification: runtime-difference."
  - Phase-4/response behavior remains non-verified; no verified PASS claim.
name: phase4_auditlog_outbound_rule_id_runtime_difference
capabilities:
  response_headers: false
  response_body: false
  audit_log: true
  phase3: false
  phase4: true
rules: |
  SecRuleEngine On
  SecAuditEngine RelevantOnly
  SecAuditLogType Serial
  SecAuditLogParts ABHZ
  SecAuditLog "@@AUDIT_LOG@@"
  SecAuditLogStorageDir "@@AUDIT_LOG_DIR@@"
  SecResponseBodyAccess On
  SecResponseBodyMimeType text/html text/plain application/json
  SecRule RESPONSE_BODY "@contains out-audit" "id:4811,phase:4,deny,status:403,auditlog,msg:'phase4 outbound audit rule id'"
request:
  method: GET
  path: "/"
response:
  body: |
    out-audit
expect:
  status: 403
  intervention: deny

origin:
  - repo: ModSecurity-nginx
    path: tests/modsecurity-request-body.t
    reason: request body checked in phase1 expected gap.
category: phase-handling
portable: true
status: imported
former_xfail: true
former_xfail_reason: "operator/transformation/phase/edge/parser compatibility candidate; runtime_verified=false and not counted as verified PASS."
promoted_from_xfail_date: "2026-06-07"
known_limitations:
  - Phase 1 is a reachability marker only; request-body content is asserted in phase 2.
name: phase1_vs_phase2_request_body_gap
capabilities:
  intervention: true
  phase1: true
  phase2: true
rules: |
  SecRuleEngine On
  SecRequestBodyAccess On
  SecAction "id:4511,phase:1,pass,nolog,msg:'phase1 reached before request body assertion'"
  SecRule REQUEST_BODY "@contains bodyhit" "id:4512,phase:2,deny,status:403,msg:'phase2 request body block'"
request:
  method: POST
  path: "/"
  headers:
    Content-Type: text/plain
  body: "bodyhit"
expect:
  status: 403
  intervention: deny
  rule_id: 4512

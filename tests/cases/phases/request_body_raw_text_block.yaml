name: request_body_raw_text_block
origin:
  - repo: ModSecurity-nginx
    path: tests/modsecurity-request-body.t
    reason: Derived from the REQUEST_BODY raw body blocking regression case.
  - repo: ModSecurity-apache
    path: tests/regression/rule/15-json.t
    reason: Uses the same connector-neutral raw request-body access pattern without JSON collection assumptions.
category: request-body
capabilities:
  - request_body
  - phase2
  - intervention
portable: true
status: imported

rules: |
  SecRuleEngine On
  SecRequestBodyAccess On
  SecRule REQUEST_BODY "@rx BAD BODY" \
    "id:2205,phase:2,deny,status:403,msg:'imported raw request body smoke'"

request:
  method: POST
  path: /
  headers:
    Content-Type: text/plain
  body: THIS IS A BAD BODY

expect:
  status: 403
  intervention: deny
  rule_id: 2205

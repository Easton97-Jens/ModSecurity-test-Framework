origin:
  - repo: ModSecurity_V3
    path: test/test-cases/regression/auditlog.json
    reason: audit log rule id presence runtime-difference probe.
category: audit-log
portable: true
status: imported
former_xfail: true
former_xfail_reason: "audit/normalization/parser/transformation-chain compatibility candidate; runtime_verified=false and not counted as verified PASS."
promoted_from_xfail_date: "2026-06-07"
known_limitations:
  - "Classification: runtime-difference."
  - Runtime verification pending; not counted as verified PASS.
name: audit_log_rule_id_presence_runtime_difference
capabilities:
  audit_log: true
  collections: false
  request_body: false
  transformations: false
rules: |
  SecRuleEngine On
  SecAuditEngine RelevantOnly
  SecAuditLogType Serial
  SecAuditLogParts ABHZ
  SecAuditLog "@@AUDIT_LOG@@"
  SecAuditLogStorageDir "@@AUDIT_LOG_DIR@@"
  SecRule ARGS:a "@streq block" "id:4601,phase:1,deny,status:403,auditlog,msg:'audit rule id presence probe'"
request:
  method: GET
  path: "/?a=block"
expect:
  status: 403
  intervention: deny

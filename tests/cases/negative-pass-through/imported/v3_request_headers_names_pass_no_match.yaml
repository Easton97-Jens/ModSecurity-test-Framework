# Source-derived V3 request header-name negative/pass-through smoke.
origin:
  - repo: ModSecurity_V3
    path: test/test-cases/regression/variable-REQUEST_HEADERS_NAMES.json
    reason: Derives from V3 REQUEST_HEADERS_NAMES coverage and validates no-match pass-through with a stable custom header.
category: collections
portable: true
status: imported
known_limitations:
  - Validates pass-through when REQUEST_HEADERS_NAMES does not contain the tested value.
  - Header ordering and implicit server-added headers remain mapped only.
name: v3_request_headers_names_pass_no_match

capabilities:
  collections: true
  request_headers: true
  phase1: true
  pass_through: true

rules: |
  SecRuleEngine On
  SecRule REQUEST_HEADERS_NAMES "@contains X-Not-Present" \
    "id:3362,phase:1,deny,status:403,msg:'v3 imported request headers names no-match pass-through'"

request:
  method: GET
  path: /
  headers:
    X-Smoke-Header: present

expect:
  status: 200
  intervention: pass
  response_contains: TEST-OK-IF-YOU-SEE-THIS

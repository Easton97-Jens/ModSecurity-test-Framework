# Source-derived V3 request cookie-name negative/pass-through smoke.
origin:
  - repo: ModSecurity_V3
    path: test/test-cases/regression/variable-REQUEST_COOKIES_NAMES.json
    reason: Derives from the V3 cookie-name fixture and validates no-match connector pass-through behavior.
category: collections
portable: true
status: imported
known_limitations:
  - Validates pass-through when REQUEST_COOKIES_NAMES does not contain the tested name.
  - Does not cover cookie folding, duplicate-name ordering, or normalization edge cases.
name: v3_request_cookies_names_pass_no_match

capabilities:
  collections: true
  request_cookies: true
  phase1: true
  pass_through: true

rules: |
  SecRuleEngine On
  SecRule REQUEST_COOKIES_NAMES "@contains SESSIONID" \
    "id:3363,phase:1,deny,status:403,msg:'v3 imported request cookie names no-match pass-through'"

request:
  method: GET
  path: "/?key=value"
  headers:
    Cookie: "USER_TOKEN=Yes; a=z; t=b"

expect:
  status: 200
  intervention: pass
  response_contains: TEST-OK-IF-YOU-SEE-THIS

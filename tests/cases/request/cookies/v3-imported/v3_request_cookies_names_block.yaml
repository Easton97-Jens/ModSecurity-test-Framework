# Source-derived V3 request cookie-name collection smoke.
origin:
  - repo: ModSecurity_V3
    path: test/test-cases/regression/variable-REQUEST_COOKIES_NAMES.json
    reason: Derives from the V3 request fixture containing the cookie name `USER_TOKEN`.
category: collections
portable: true
status: imported
known_limitations:
  - Converts debug-log collection assertions to an HTTP intervention assertion.
  - Cookie name normalization edge cases remain mapped only.
name: v3_request_cookies_names_block

capabilities:
  collections: true
  request_cookies: true
  phase1: true
  intervention: true

rules: |
  SecRuleEngine On
  SecRule REQUEST_COOKIES_NAMES "@contains USER_TOKEN" \
    "id:3322,phase:1,deny,status:403,msg:'v3 imported request cookies names block'"

request:
  method: GET
  path: "/?key=value&key=other_value"
  headers:
    Cookie: "USER_TOKEN=Yes; a=z; t=b"

expect:
  status: 403
  intervention: deny
  rule_id: 3322

origin:
  - repo: ModSecurity_V2
    path: tests/tfn/urlDecode.t
    reason: Source-derived invalid-encoding urlDecode branch prepared as mapped-only candidate.
category: transformations
portable: true
status: xfail
known_limitations:
  - Invalid percent-encoding handling varies and is currently unproven across connectors.
name: v2_transformation_url_decode_invalid_sequence_mapped_candidate
capabilities:
  transformations: true
  request_uri: true
  phase1: true
  intervention: true
rules: |
  SecRuleEngine On
  SecRule REQUEST_URI "@contains %" "id:4406,phase:1,t:urlDecode,deny,status:403,msg:'xfail invalid urlDecode sequence mapped candidate'"
request:
  method: GET
  path: "/?q=%ZZ"
expect:
  status: 403
  intervention: deny

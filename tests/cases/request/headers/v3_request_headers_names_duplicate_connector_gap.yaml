promoted_from_xfail_date: "2026-06-07"
known_limitations:
  - Duplicate-header normalization may differ across Apache and NGINX.
name: v3_request_headers_names_duplicate_connector_gap
capabilities:
  collections: true
  request_headers: true
  phase1: true
  intervention: true
rules: |
  SecRuleEngine On
  SecRule REQUEST_HEADERS_NAMES "@contains X-Dupe" "id:4402,phase:1,deny,status:403,msg:'former XFAIL duplicate header-name connector gap'"

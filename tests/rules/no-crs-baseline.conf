# Canonical connector-neutral No-CRS verification rules.
#
# This file intentionally contains no CRS include and no payload logging.  The
# reserved 1100000-1100999 range belongs to the framework baseline.  A host
# runner may exercise only the rules supported by its declared capabilities;
# loading a rule does not by itself verify the matching host phase.

SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess On
SecResponseBodyMimeType text/plain text/html application/json

# Native core probe compatibility: keep this exact header/value/ID contract.
SecRule REQUEST_HEADERS:X-Modsec-Smoke "@streq block" \
    "id:1100001,phase:1,deny,status:403,log,t:none,msg:'no-crs phase-1 deny'"

SecRule REQUEST_HEADERS:X-Modsec-Smoke "@streq alternative-status" \
    "id:1100002,phase:1,deny,status:429,log,t:none,msg:'no-crs phase-1 alternative status'"

SecRule REQUEST_HEADERS:X-Modsec-Transaction-Id "@rx ^[A-Za-z0-9._:-]{1,128}$" \
    "id:1100003,phase:1,pass,log,t:none,msg:'no-crs transaction-id metadata'"

SecRule REQUEST_BODY "@contains no-crs-request-body-marker" \
    "id:1100101,phase:2,deny,status:403,log,t:none,msg:'no-crs phase-2 deny'"

SecRule RESPONSE_HEADERS:X-Modsec-Upstream "@streq block" \
    "id:1100201,phase:3,deny,status:403,log,t:none,msg:'no-crs phase-3 intervention probe'"

SecRule RESPONSE_HEADERS:X-Modsec-Upstream "@streq redirect" \
    "id:1100202,phase:3,redirect:'https://no-crs.invalid/phase3-redirect',status:302,log,t:none,msg:'no-crs phase-3 redirect probe'"

SecRule RESPONSE_BODY "@contains no-crs-response-body-marker" \
    "id:1100301,phase:4,deny,status:403,log,t:none,msg:'no-crs phase-4 intervention probe'"

SecRule REQUEST_HEADERS:X-Modsec-Smoke "@streq redirect" \
    "id:1100401,phase:1,redirect:'https://no-crs.invalid/redirect',status:302,log,t:none,msg:'no-crs redirect'"

SecRule REQUEST_HEADERS:X-Modsec-Smoke "@streq log-only" \
    "id:1100402,phase:1,pass,log,t:none,msg:'no-crs log-only'"

SecRule REQUEST_HEADERS:X-Modsec-Smoke "@streq drop" \
    "id:1100403,phase:1,drop,log,t:none,msg:'no-crs drop or abort'"

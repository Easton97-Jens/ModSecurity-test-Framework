# Source-derived V2 operator semantics smoke.
origin:
  - repo: ModSecurity_V2
    path: tests/op/containsWord.t
    reason: Derives from the V2 @containsWord case with param `abc`, input `abc def ghi`, ret 1.
category: operators
portable: true
status: imported
known_limitations:
  - Converted from the V2 operator harness to an HTTP phase:2 intervention check.
  - Word-boundary negative branches remain mapped only.
name: v2_operator_contains_word_block

capabilities:
  operators: true
  query_args: true
  phase2: true
  intervention: true

rules: |
  SecRuleEngine On
  SecRule ARGS:probe "@containsWord abc" \
    "id:3223,phase:2,deny,status:403,msg:'v2 imported containsWord operator block'"

request:
  method: GET
  path: "/?probe=abc%20def%20ghi"

expect:
  status: 403
  intervention: deny
  rule_id: 3223

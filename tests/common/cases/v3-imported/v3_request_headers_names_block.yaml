# Source-derived V3 request header-name collection smoke.
origin:
  - repo: ModSecurity_V3
    path: test/test-cases/regression/variable-REQUEST_HEADERS_NAMES.json
    reason: Derives from V3 REQUEST_HEADERS_NAMES coverage; uses a stable custom header name instead of volatile connector-added names.
category: collections
portable: true
status: imported
known_limitations:
  - The original V3 cases assert standard header names in debug logs; this smoke uses a custom header name for cross-connector stability.
  - Header ordering and implicit server-added headers remain mapped only.
name: v3_request_headers_names_block

capabilities:
  collections: true
  request_headers: true
  phase1: true
  intervention: true

rules: |
  SecRuleEngine On
  SecRule REQUEST_HEADERS_NAMES "@contains X-Smoke-Header" \
    "id:3323,phase:1,deny,status:403,msg:'v3 imported request headers names block'"

request:
  method: GET
  path: /
  headers:
    X-Smoke-Header: present

expect:
  status: 403
  intervention: deny
  rule_id: 3323

origin:
  - repo: ModSecurity-apache
    path: tests/regression/rule/15-json.t
    reason: Source-derived invalid JSON parser behavior prepared as runtime-difference probe.
category: body-processors
portable: true
status: xfail
known_limitations:
  - Invalid JSON parser treatment and rule target visibility differ by runtime/setup.
name: request_body_json_invalid_runtime_difference
capabilities:
  json: true
  request_body: true
  phase2: true
  intervention: true
rules: |
  SecRuleEngine On
  SecRule REQUEST_BODY "@contains badjson" "id:4409,phase:2,deny,status:403,msg:'xfail invalid JSON runtime difference'"
request:
  method: POST
  path: /
  headers:
    Content-Type: application/json
  body: "{\"badjson\": }"
expect:
  status: 403
  intervention: deny

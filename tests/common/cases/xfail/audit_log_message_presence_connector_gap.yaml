origin:
  - repo: ModSecurity_V3
    path: test/test-cases/regression/auditlog.json
    reason: audit log message field connector-gap probe.
category: audit-log
portable: true
status: xfail
known_limitations:
  - "Classification: connector-gap."
  - Runtime verification pending; not counted as verified PASS.
name: audit_log_message_presence_connector_gap
capabilities:
  audit_log: true
  collections: false
  request_body: false
  transformations: false
rules: |
  SecRuleEngine On
  SecAuditEngine RelevantOnly
  SecAuditLogType Serial
  SecAuditLogParts ABHZ
  SecAuditLog "@@AUDIT_LOG@@"
  SecAuditLogStorageDir "@@AUDIT_LOG_DIR@@"
  SecRule ARGS:a "@streq block" "id:4602,phase:1,deny,status:403,auditlog,msg:'audit message presence probe'"
request:
  method: GET
  path: "/?a=block"
expect:
  status: 403
  intervention: deny

origin:
  - repo: ModSecurity-nginx PR #377
    path: tests/modsecurity-phase4-regression.t
    reason: phase4 chunk/buffering connector-gap assumption probe.
category: response-body
portable: true
status: xfail
known_limitations:
  - "Classification: connector-gap."
  - Phase-4/response behavior remains non-verified; no verified PASS claim.
name: phase4_response_body_chunk_assumption_connector_gap
capabilities:
  response_headers: false
  response_body: true
  audit_log: false
  phase3: false
  phase4: true
rules: |
  SecRuleEngine On
  SecAuditEngine RelevantOnly
  SecAuditLogType Serial
  SecAuditLogParts ABHZ
  SecAuditLog "@@AUDIT_LOG@@"
  SecAuditLogStorageDir "@@AUDIT_LOG_DIR@@"
  SecResponseBodyAccess On
  SecResponseBodyMimeType text/html text/plain application/json
  SecRule RESPONSE_BODY "@contains chunked-marker" "id:4808,phase:4,deny,status:403,msg:'phase4 chunk assumption connector gap'"
request:
  method: GET
  path: "/"
response:
  body: |
    chunked-marker
expect:
  status: 403
  intervention: deny

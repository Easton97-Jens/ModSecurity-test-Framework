origin:
  - repo: ModSecurity-apache
    path: tests/regression/config/10-response-directives.t
    reason: phase3 content-type charset normalization connector-gap probe.
category: response-headers
portable: true
status: xfail
known_limitations:
  - "Classification: connector-gap."
  - RESPONSE_BODY remains non-verified and non-promoted.
name: phase3_response_headers_content_type_charset_gap
capabilities:
  response_headers: true
  response_body: false
  audit_log: false
  phase3: true
  phase4: false
rules: |
  SecRuleEngine On
  SecAuditEngine RelevantOnly
  SecAuditLogType Serial
  SecAuditLogParts ABHZ
  SecAuditLog "@@AUDIT_LOG@@"
  SecAuditLogStorageDir "@@AUDIT_LOG_DIR@@"
  SecResponseBodyAccess On
  SecResponseBodyMimeType text/html text/plain application/json
  SecRule RESPONSE_HEADERS:Content-Type "@contains charset" "id:4902,phase:3,deny,status:403,msg:'phase3 content-type charset gap'"
request:
  method: GET
  path: "/"
response:
  body: |
    TEST-OK-IF-YOU-SEE-THIS
expect:
  status: 403
  intervention: deny

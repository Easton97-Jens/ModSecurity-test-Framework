# Source-derived V3 request cookie negative/pass-through smoke.
origin:
  - repo: ModSecurity_V3
    path: test/test-cases/regression/variable-REQUEST_COOKIES.json
    reason: "Derives from the V3 cookie fixture `Cookie: USER_TOKEN=Yes; a=z; t=b`, but validates the no-match connector pass-through branch."
category: collections
portable: true
status: imported
known_limitations:
  - Validates pass-through when the cookie collection does not match a disruptive condition.
  - Does not prove cookie parsing edge cases or duplicate-name behavior.
name: v3_request_cookies_pass_no_match

capabilities:
  collections: true
  request_cookies: true
  phase1: true
  pass_through: true

rules: |
  SecRuleEngine On
  SecRule REQUEST_COOKIES:USER_TOKEN "@streq No" \
    "id:3361,phase:1,deny,status:403,msg:'v3 imported request cookies no-match pass-through'"

request:
  method: GET
  path: "/?key=value"
  headers:
    Cookie: "USER_TOKEN=Yes; a=z; t=b"

expect:
  status: 200
  intervention: pass
  response_contains: TEST-OK-IF-YOU-SEE-THIS

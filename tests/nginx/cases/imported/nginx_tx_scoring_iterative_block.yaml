name: nginx_tx_scoring_iterative_block
origin:
  - repo: ModSecurity-nginx
    path: tests/modsecurity-scoring.t
    reason: Derived from the iterative tx.score increment blocking case.
category: actions
capabilities:
  - query_args
  - collections
  - tx
  - phase2
  - intervention
portable: false
connector: nginx
status: imported

rules: |
  SecRuleEngine On
  SecRule ARGS "@streq badarg1" "id:3201,phase:2,setvar:tx.score=+1"
  SecRule ARGS "@streq badarg2" "id:3202,phase:2,setvar:tx.score=+1"
  SecRule ARGS "@streq badarg3" "id:3203,phase:2,setvar:tx.score=+1"
  SecRule TX:SCORE "@ge 3" \
    "id:3299,phase:2,deny,log,status:403,msg:'nginx imported iterative scoring smoke'"

request:
  method: GET
  path: "/?a=badarg1&b=badarg2&c=badarg3"

expect:
  status: 403
  intervention: deny
  rule_id: 3299

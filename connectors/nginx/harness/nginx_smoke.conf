# NGINX smoke-test template.
#
# This file is not used in place. run_nginx_smoke.sh renders it into
# BUILD_ROOT before NGINX is started.

load_module "@@NGINX_MODULE@@";

daemon off;
worker_processes 1;
pid "@@RUNTIME_ROOT@@/nginx.pid";
error_log "@@LOG_DIR@@/error.log" debug;

events {
    worker_connections 64;
}

http {
    access_log "@@LOG_DIR@@/access.log";
    client_body_temp_path "@@RUNTIME_ROOT@@/client_body_temp";
    proxy_temp_path "@@RUNTIME_ROOT@@/proxy_temp";
    fastcgi_temp_path "@@RUNTIME_ROOT@@/fastcgi_temp";
    uwsgi_temp_path "@@RUNTIME_ROOT@@/uwsgi_temp";
    scgi_temp_path "@@RUNTIME_ROOT@@/scgi_temp";

    server {
        listen 127.0.0.1:@@PORT@@;
        server_name localhost;

        modsecurity on;
        modsecurity_rules_file "@@RULES_FILE@@";

        location = /__modsec_smoke_ready {
            modsecurity off;
            return 204;
        }

        location / {
            root "@@DOCROOT@@";
            index index.html;
        }
    }
}
